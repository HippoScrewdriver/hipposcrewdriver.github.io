<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namarie Studio — Su Lee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: #faf8f6; color: #2e1e1e; }

  /* NAV */
  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 32px 52px; border-bottom: 1px solid #ede8e3;
    opacity: 0; animation: fadeUp 0.6s ease 0.1s forwards;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 400; letter-spacing: 0.12em; color: #3a2a2a; text-decoration: none; }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a { font-size: 11px; letter-spacing: 0.2em; color: #a08c8c; text-transform: uppercase; font-weight: 300; text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: #c9a69a; }

  /* HERO */
  .hero { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #ede8e3; }
  .hero-left {
    padding: 52px; display: flex; flex-direction: column; justify-content: center;
    border-right: 1px solid #ede8e3;
  }
  .tag {
    font-size: 10px; letter-spacing: 0.35em; color: #c9a69a; text-transform: uppercase;
    font-weight: 300; margin-bottom: 20px;
    opacity: 0; animation: fadeUp 0.5s ease 0.4s forwards;
  }
  h1 {
    font-family: 'Playfair Display', serif; font-size: 48px; line-height: 1.15;
    color: #2e1e1e; font-weight: 300;
    opacity: 0; animation: fadeUp 0.6s ease 0.6s forwards;
  }
  h1 i { font-style: italic; color: #c9a69a; }
  .word-cycle {
    display: inline-block;
    clip-path: inset(0 100% 0 0);
    opacity: 0;
  }
  .word-cycle.animating {
    animation: wordCycle 3.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes wordCycle {
    0%   { clip-path: inset(0 100% 0 0); opacity: 0; }
    32%  { clip-path: inset(0 0% 0 0);   opacity: 1; }
    72%  { clip-path: inset(0 0% 0 0);   opacity: 1; }
    100% { clip-path: inset(0 0% 0 0);   opacity: 0; }
  }
  .rule { width: 0; height: 1px; background: #c9a69a; margin: 24px 0; animation: grow 0.5s ease 1.1s forwards; }
  .desc {
    font-size: 13px; color: #a08c8c; line-height: 1.85; font-weight: 300; max-width: 280px;
    opacity: 0; animation: fadeUp 0.5s ease 1.2s forwards;
  }
  .cta {
    display: inline-block; margin-top: 32px; font-size: 10px; letter-spacing: 0.28em;
    color: #7a4e4e; text-transform: uppercase; border-bottom: 1px solid #c9a69a;
    padding-bottom: 4px; text-decoration: none; font-weight: 300; transition: color 0.2s;
    opacity: 0; animation: fadeUp 0.5s ease 1.4s forwards;
  }
  .cta:hover { color: #c9a69a; }

  /* HERO IMAGE */
  .hero-right {
    background: #faf8f6;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
  }
  .hero-right img {
    width: 82%;
    height: auto;
    display: block;
    box-shadow: 0 6px 32px rgba(46, 30, 30, 0.10);
    opacity: 0;
    animation: imgReveal 0.8s ease 0.7s forwards;
    transition: transform 0.6s ease, box-shadow 0.6s ease;
  }
  .hero-right:hover img {
    transform: scale(1.02);
    box-shadow: 0 12px 48px rgba(46, 30, 30, 0.15);
  }

  /* GALLERY */
  .gallery-section { padding: 52px; }
  .gallery-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 52px; opacity: 0; animation: fadeUp 0.5s ease 0.3s forwards; }
  .page-title { font-family: 'Playfair Display', serif; font-size: 34px; color: #2e1e1e; font-weight: 300; }
  .page-title i { font-style: italic; color: #c9a69a; }
  .page-tag { font-size: 10px; letter-spacing: 0.3em; color: #c9a69a; text-transform: uppercase; font-weight: 300; }

  /* MASONRY — all photos together, natural ratio */
  .masonry { columns: 3; column-gap: 8px; }
  .masonry img {
    width: 100%; height: auto; display: block;
    margin-bottom: 8px; break-inside: avoid;
    transition: opacity 0.3s ease;
  }
  .masonry img:hover { opacity: 0.88; }

  /* ANIMATIONS */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes grow { from { width: 0; } to { width: 32px; } }
  @keyframes imgReveal { from { opacity: 0; transform: scale(1.02); } to { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Namarie Studio</a>
</nav>

<!-- HERO -->
<section class="hero">

    <div class="rule"></div>
    <p class="desc">Su Lee photographs weddings with warmth and intention — soft light, honest moments, and stories worth keeping.</p>
    <a href="#gallery" class="cta">View Portfolio</a>

<script>
const words = ['forever', 'you', 'always'];
let wi = 0;
const el = document.querySelector('.word-cycle');
function showNext() {
  el.textContent = words[wi];
  el.classList.remove('animating');
  el.offsetHeight;
  el.classList.add('animating');
  wi = (wi + 1) % words.length;
}
setTimeout(() => { showNext(); setInterval(showNext, 3800); }, 1600);
</script>

</html>
