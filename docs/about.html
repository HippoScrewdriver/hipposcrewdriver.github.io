<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Su Lee — Namarie Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #faf8f6; color: #2e1e1e; }

  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 32px 52px; border-bottom: 1px solid #ede8e3;
    opacity: 0; animation: fadeUp 0.5s ease 0.1s forwards;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 400; letter-spacing: 0.12em; color: #3a2a2a; text-decoration: none; }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a { font-size: 11px; letter-spacing: 0.2em; color: #a08c8c; text-transform: uppercase; font-weight: 300; text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: #c9a69a; }

  /* INTRO */
  .intro { border-bottom: 1px solid #ede8e3; }
  .bio { padding: 64px 52px; display: flex; flex-direction: column; justify-content: center; max-width: 640px; }
  .tag { font-size: 10px; letter-spacing: 0.35em; color: #c9a69a; text-transform: uppercase; font-weight: 300; margin-bottom: 14px; opacity: 0; animation: fadeUp 0.5s ease 0.5s forwards; }
  .bio-name { font-family: 'Playfair Display', serif; font-size: 38px; color: #2e1e1e; font-weight: 300; opacity: 0; animation: fadeUp 0.6s ease 0.7s forwards; }
  .bio-name i { font-style: italic; }
  .rule { width: 0; height: 1px; background: #c9a69a; margin: 18px 0; animation: grow 0.5s ease 1s forwards; }
  .bio-body { font-size: 13px; color: #a08c8c; line-height: 1.9; font-weight: 300; opacity: 0; animation: fadeUp 0.5s ease 1.1s forwards; }
  .bio-body + .bio-body { margin-top: 10px; animation-delay: 1.25s; }
  .sig { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; color: #b89090; margin-top: 24px; opacity: 0; animation: fadeUp 0.5s ease 1.5s forwards; }

  /* GALLERY */
  .gallery { padding: 48px 52px 56px; }
  .glabel { font-size: 10px; letter-spacing: 0.3em; color: #c9a69a; text-transform: uppercase; font-weight: 300; margin-bottom: 20px; opacity: 0; animation: fadeUp 0.4s ease 1.6s forwards; }
  .grid { display: flex; gap: 6px; align-items: flex-start; }
  .cell { overflow: hidden; border-radius: 2px; background: #e8d8d0; opacity: 0; transform: translateY(10px); flex: 1; }
  .cell:first-child { flex: 2; }
  .cell img { width: 100%; height: auto; display: block; transition: transform 0.4s ease; }
  .cell:hover img { transform: scale(1.02); }
  .cell:nth-child(1) { animation: cellIn 0.5s ease 1.7s forwards; background: #ddc8bc; }
  .cell:nth-child(2) { animation: cellIn 0.5s ease 1.85s forwards; background: #ecddd8; }
  .cell:nth-child(3) { animation: cellIn 0.5s ease 2.0s forwards; background: #e4d0c8; }
  .cell:nth-child(4) { animation: cellIn 0.5s ease 2.15s forwards; background: #f0e2dc; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes grow { from { width: 0; } to { width: 28px; } }
  @keyframes cellIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Namarie Studio</a>
  <ul class="nav-links">
    <li><a href="gallery.html">Work</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section class="intro">
  <div class="bio">
    <div class="tag">Photographer</div>
    <div class="bio-name"><i>Su Lee</i></div>
    <div class="rule"></div>
    <p class="bio-body">I have been photographing weddings and portraits for 8 years — drawn to honest glances, soft afternoon light, and the small moments between the big ones.</p>
    <p class="bio-body">Based wherever you are. Available worldwide.</p>
    <div class="sig">— Su</div>
  </div>
</section>

<section class="gallery">
  <div class="glabel">Recent work</div>
  <div class="grid">
    <div class="cell">
      <img src="images/IMG_4858.JPG" alt="Recent work 1" onerror="this.style.display='none'">
    </div>
    <div class="cell">
      <img src="images/IMG_4859.JPG" alt="Recent work 2" onerror="this.style.display='none'">
    </div>
    <div class="cell">
      <img src="images/IMG_4860.JPG" alt="Recent work 3" onerror="this.style.display='none'">
    </div>
    <div class="cell">
      <img src="images/IMG_4861.JPG" alt="Recent work 4" onerror="this.style.display='none'">
    </div>
  </div>
</section>

</body>
</html>
